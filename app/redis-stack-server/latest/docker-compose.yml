services:
  redis-stack-server:
    image: redis/redis-stack-server
    # Always pull docker image
    #pull_policy: always
    restart: always
    hostname: redis-stack-server

    environment:
      - TZ=${TIMEZONE}
      - REDIS_ARGS=${REDIS_ARGS:- }
      - REDISEARCH_ARGS=${REDISEARCH_ARGS:- }
      - REDISJSON_ARGS=${REDISJSON_ARGS:- }
      - REDISTIMESERIES_ARGS=${REDISTIMESERIES_ARGS:- }
      - REDISBLOOM_ARGS=${REDISBLOOM_ARGS:- }

    ports:
      # [local-machine:]local-port:docker-port
      - "${LOCAL_LISTEN_ADDR}${HOST_PORT_REDIS}:6379"

    networks:
      - net

    volumes:
      # ---- Format: ----
      # HOST-DIRECTORY : DOCKER-DIRECTORY

      # Mount Redis Data directory
      - ${VOLUME_PATH}/redis-stack-server-latest:/data:rw${MOUNT_OPTIONS}

networks:
  net:
    name: ${COMPOSE_NETWORK_NAME}
    driver: bridge
